<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelişmiş NFC Kart Okuyucu</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        h2 { color: #1a73e8; margin-bottom: 20px; }
        #scanBtn { background-color: #1a73e8; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; }
        #scanBtn:hover { background-color: #1557b0; }
        #output { margin-top: 25px; text-align: left; display: none; border-top: 2px solid #eee; pt: 15px; }
        .info-item { background: #f8f9fa; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #1a73e8; }
        .label { font-weight: bold; color: #555; font-size: 12px; text-transform: uppercase; display: block; }
        .value { font-size: 16px; color: #222; word-break: break-all; }
        #status { margin-top: 15px; font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>

<div class="card">
    <h2>NFC Kimlik Okuyucu</h2>
    <p>Kartı okutmak için butona basıp telefonun arkasına dokundurun.</p>
    
    <button id="scanBtn">Kartı Tara</button>
    
    <div id="status"></div>

    <div id="output">
        <div class="info-item">
            <span class="label">Kart Seri Numarası (UID)</span>
            <span id="uid" class="value">-</span>
        </div>
        <div id="recordsContainer">
            </div>
    </div>
</div>

<script>
    const scanBtn = document.getElementById('scanBtn');
    const status = document.getElementById('status');
    const output = document.getElementById('output');
    const uidDisplay = document.getElementById('uid');
    const recordsContainer = document.getElementById('recordsContainer');

    scanBtn.addEventListener('click', async () => {
        if (!('NDEFReader' in window)) {
            status.innerHTML = "<span style='color:red'>Hata: Tarayıcı NFC desteklemiyor veya HTTPS değil!</span>";
            return;
        }

        try {
            const ndef = new NDEFReader();
            await ndef.scan();
            
            status.innerHTML = "<span style='color:blue'>Tarama başladı... Kartı yaklaştırın.</span>";

            ndef.onreading = ({ message, serialNumber }) => {
                status.innerHTML = "<span style='color:green'>Okuma Başarılı!</span>";
                output.style.display = "block";
                
                // UID (Seri Numarası) bilgisini yaz
                uidDisplay.innerText = serialNumber || "Gizli veya Yok";

                // İçerikteki verileri (Metinleri) oku
                recordsContainer.innerHTML = ""; // Önce temizle
                for (const record of message.records) {
                    const decoder = new TextDecoder(record.encoding || 'utf-8');
                    const dataText = decoder.decode(record.data);
                    
                    recordsContainer.innerHTML += `
                        <div class="info-item">
                            <span class="label">Kayıt Tipi: ${record.recordType}</span>
                            <span class="value">${dataText}</span>
                        </div>
                    `;
                }
            };

            ndef.onreadingerror = () => {
                status.innerHTML = "<span style='color:red'>Kart okunamadı. Tekrar deneyin.</span>";
            };

        } catch (error) {
            status.innerHTML = "<span style='color:red'>Hata: " + error + "</span>";
        }
    });
</script>

</body>
</html>
