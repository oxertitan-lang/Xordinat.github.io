<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Kart Bilgi Okuyucu</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        button { background-color: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: background 0.3s; }
        button:hover { background-color: #0056b3; }
        #status { margin-top: 20px; font-weight: bold; color: #555; }
        #result { margin-top: 15px; text-align: left; background: #eee; padding: 10px; border-radius: 5px; word-break: break-all; white-space: pre-wrap; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>NFC Okuyucu</h2>
    <p>Kart bilgilerini görmek için aşağıdaki butona basın ve kartı telefonun arkasına yaklaştırın.</p>
    <button id="scanBtn">Taramayı Başlat</button>
    <div id="status">Hazır.</div>
    <div id="result"></div>
</div>

<script>
    const scanBtn = document.getElementById('scanBtn');
    const statusDiv = document.getElementById('status');
    const resultDiv = document.getElementById('result');

    scanBtn.addEventListener('click', async () => {
        if (!('NDEFReader' in window)) {
            statusDiv.innerText = "Hata: Tarayıcınız Web NFC desteğine sahip değil. (Android Chrome deneyin)";
            return;
        }

        try {
            const ndef = new NDEFReader();
            await ndef.scan();
            
            statusDiv.innerText = "NFC Taraması Aktif... Kartı yaklaştırın.";
            statusDiv.style.color = "blue";

            ndef.onreadingerror = () => {
                statusDiv.innerText = "Hata: Kart okunamadı. Tekrar deneyin.";
                statusDiv.style.color = "red";
            };

            ndef.onreading = ({ message, serialNumber }) => {
                statusDiv.innerText = "Okuma Başarılı!";
                statusDiv.style.color = "green";
                resultDiv.style.display = "block";
                
                let output = `Seri Numarası: ${serialNumber}\n`;
                
                for (const record of message.records) {
                    const decoder = new TextDecoder(record.encoding);
                    output += `Kayıt Tipi: ${record.recordType}\n`;
                    output += `Veri: ${decoder.decode(record.data)}\n`;
                }
                
                resultDiv.innerText = output;
            };

        } catch (error) {
            statusDiv.innerText = "Hata: " + error;
            statusDiv.style.color = "red";
        }
    });
</script>

</body>
</html>
